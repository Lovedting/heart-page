<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>你是人间四月天 · 乐谱逐音版</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #2a103a 0%, #12061d 42%, #05010a 100%);
    }

    .bg-stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.8);
      animation: starFloat linear infinite;
    }

    @keyframes starFloat {
      from { transform: translateY(0); opacity: .2; }
      50% { opacity: .85; }
      to { transform: translateY(-120vh); opacity: .1; }
    }

    .heart-layer {
      position: fixed;
      inset: 0;
      z-index: 8;
      overflow: hidden;
      pointer-events: none;
    }
    .heart {
      position: absolute;
      width: 9px;
      height: 8px;
      pointer-events: none;
      animation: heartRise linear forwards;
      opacity: .98;
      filter:
        drop-shadow(0 0 5px rgba(255, 90, 160, 0.75))
        drop-shadow(0 0 12px rgba(255, 90, 160, 0.32));
    }

    .heart svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
@keyframes heartRise {
      0% {
        transform: translate3d(0, 0, 0) rotate(0deg) scale(var(--scale));
        opacity: 0;
      }
      12% {
        opacity: .98;
      }
      100% {
        transform: translate3d(var(--drift), -110vh, 0) rotate(var(--spin)) scale(var(--scale));
        opacity: 0;
      }
    }
.char-pop {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 30;
      pointer-events: none;
      animation: charBurst 1.05s ease forwards;
      white-space: nowrap;
      padding: 2px 8px 10px;
    }

    .char-pop .intro-char {
      display: block;
      position: relative;
      color: #fff;
      font-size: clamp(26px, 10vw, 46px);
      font-weight: 900;
      line-height: 1;
      text-align: center;
      text-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 18px rgba(255,120,180,0.72),
        0 0 28px rgba(255,90,160,0.42);
    }

    .char-pop .intro-symbol {
      display: block;
      position: absolute;
      left: 50%;
      top: calc(100% - 6px);
      transform: translateX(calc(-50% + var(--note-dx, 0px))) rotate(var(--note-rot, 0deg));
      color: #fff7fb;
      font-size: clamp(15px, 5vw, 24px);
      font-weight: 900;
      line-height: 1;
      text-shadow:
        0 0 7px rgba(255,255,255,0.92),
        0 0 16px rgba(255,160,210,0.68),
        0 0 24px rgba(255,90,160,0.32);
      opacity: 0.95;
    }

    .note-pop {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 31;
      pointer-events: none;
      color: #fff7fb;
      font-size: clamp(15px, 4.8vw, 24px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.5px;
      text-shadow:
        0 0 8px rgba(255,255,255,0.95),
        0 0 18px rgba(255,160,210,0.78),
        0 0 28px rgba(255,90,160,0.45);
      animation: noteFloat 1.25s ease forwards;
      white-space: nowrap;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    @keyframes noteFloat {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.5);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -60%) scale(1.05);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -190%) scale(0.9);
      }
    }
60% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.04);
      }
      100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    @keyframes charBurst {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.55);
      }
      18% {
        opacity: 1;
        transform: translate(-50%, -56%) scale(1.06);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -125%) scale(0.98);
      }
    }

    .kitty-wrap {
      position: fixed;
      left: 50%;
      top: 34%;
      transform: translate(-50%, -50%);
      width: min(44vw, 220px);
      aspect-ratio: 1 / 1;
      z-index: 12;
      animation: kittyFloat 3.8s ease-in-out infinite;
      pointer-events: none;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.18))
              drop-shadow(0 0 26px rgba(255,90,160,0.22));
    }

    .zxy-text {
      position: fixed;
      left: 50%;
      bottom: 14vh;
      transform: translateX(-50%);
      z-index: 18;
      color: #fff;
      font-size: clamp(28px, 9vw, 48px);
      font-weight: 800;
      letter-spacing: 2px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.92),
        0 0 24px rgba(255,110,180,0.72),
        0 0 38px rgba(255,90,160,0.42);
      animation: zxyBeat 1.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes kittyFloat {
      0%,100% { transform: translate(-50%, -50%) translateY(0); }
      50% { transform: translate(-50%, -50%) translateY(-9px); }
    }

    @keyframes zxyBeat {
      0%,100% { transform: translateX(-50%) scale(1); }
      30% { transform: translateX(-50%) scale(1.04); }
      55% { transform: translateX(-50%) scale(.985); }
      80% { transform: translateX(-50%) scale(1.02); }
    }

    @keyframes textBeat {
      0%,100% { transform: translate(-50%, -50%) scale(1); }
      30% { transform: translate(-50%, -50%) scale(1.04); }
      55% { transform: translate(-50%, -50%) scale(.985); }
      80% { transform: translate(-50%, -50%) scale(1.02); }
    }
  </style>
</head>

  <script>
    const bgStars = document.getElementById('bgStars');
    const heartLayer = document.getElementById('heartLayer');

    function createStar() {
      const s = document.createElement('div');
      s.className = 'star';
      const size = 1 + Math.random() * 3;
      s.style.width = size + 'px';
      s.style.height = size + 'px';
      s.style.left = Math.random() * 100 + 'vw';
      s.style.top = (80 + Math.random() * 30) + 'vh';
      s.style.opacity = (0.15 + Math.random() * 0.6).toFixed(2);
      s.style.animationDuration = (10 + Math.random() * 14).toFixed(2) + 's';
      s.style.animationDelay = (-Math.random() * 20).toFixed(2) + 's';
      bgStars.appendChild(s);
    }

    function createHeart(x, y, options = {}) {
      const h = document.createElement('div');
      h.className = 'heart';
      const scale = (options.scale ?? (0.55 + Math.random() * 0.9)).toFixed(2);
      const drift = ((Math.random() - 0.5) * (options.driftRange ?? 180)).toFixed(0) + 'px';
      const spin = ((Math.random() - 0.5) * 12).toFixed(0) + 'deg';
      const duration = (options.duration ?? (4.8 + Math.random() * 4.2)).toFixed(2) + 's';
      const width = (options.width ?? (8 + Math.random() * 7)).toFixed(0) + 'px';
      const height = (options.height ?? (7 + Math.random() * 6)).toFixed(0) + 'px';

      h.style.left = x + 'px';
      h.style.top = y + 'px';
      h.style.width = width;
      h.style.height = height;
      h.style.setProperty('--scale', scale);
      h.style.setProperty('--drift', drift);
      h.style.setProperty('--spin', spin);
      h.style.animationDuration = duration;
      h.style.opacity = options.opacity ?? (0.55 + Math.random() * 0.45);

      h.innerHTML = `
        <svg viewBox="0 0 100 90" aria-hidden="true">
          <defs>
            <linearGradient id="g${Math.random().toString(36).slice(2, 8)}" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#ffb2d8"/>
              <stop offset="55%" stop-color="#ff73b2"/>
              <stop offset="100%" stop-color="#ff4f9f"/>
            </linearGradient>
          </defs>
          <path d="M50 82
                   C47 78, 15 56, 15 31
                   C15 16, 25 8, 36 8
                   C43 8, 48 12, 50 18
                   C52 12, 57 8, 64 8
                   C75 8, 85 16, 85 31
                   C85 56, 53 78, 50 82 Z"
                fill="url(#g${Math.random().toString(36).slice(2, 8)})"
                stroke="rgba(255,255,255,0.52)"
                stroke-width="2"
                stroke-linejoin="round"/>
        </svg>
      `;

      // Fix gradient id match after insertion
      const svg = h.querySelector('svg');
      const grad = svg.querySelector('linearGradient');
      const path = svg.querySelector('path');
      const gid = grad.id;
      path.setAttribute('fill', `url(#${gid})`);

      heartLayer.appendChild(h);
      h.addEventListener('animationend', () => h.remove());
    }

    function seedHearts() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      for (let i = 0; i < 70; i++) {
        createHeart(
          Math.random() * w,
          h * 0.18 + Math.random() * h * 0.82,
          {
            duration: 6 + Math.random() * 6,
            driftRange: 120,
            scale: 0.45 + Math.random() * 1.0,
            width: 7 + Math.random() * 5,
            height: 6 + Math.random() * 4,
            opacity: 0.35 + Math.random() * 0.55
          }
        );
      }

      const cx = w / 2;
      const cy = h * 0.80;
      for (let i = 0; i < 26; i++) {
        const angle = (Math.PI * 2 * i) / 26;
        const r = 55 + Math.random() * 95;
        createHeart(
          cx + Math.cos(angle) * r,
          cy + Math.sin(angle) * r * 0.35,
          {
            duration: 5.5 + Math.random() * 4.5,
            driftRange: 90,
            scale: 0.7 + Math.random() * 0.8,
            width: 8 + Math.random() * 5,
            height: 7 + Math.random() * 4,
            opacity: 0.6 + Math.random() * 0.35
          }
        );
      }
    }

    function burstHearts(x, y, count = 44) {
      for (let i = 0; i < count; i++) {
        createHeart(x + (Math.random() - 0.5) * 56, y + (Math.random() - 0.5) * 34, {
          duration: 4 + Math.random() * 3.6,
          driftRange: 240,
          scale: 0.7 + Math.random() * 1.1,
          width: 8 + Math.random() * 4,
          height: 7 + Math.random() * 3,
          opacity: 0.7 + Math.random() * 0.3
        });
      }
    }

    function keepHeartsVisible() {
      const current = heartLayer.childElementCount;
      if (current < 90) {
        const add = 18;
        const w = window.innerWidth;
        const h = window.innerHeight;
        for (let i = 0; i < add; i++) {
          createHeart(Math.random() * w, h + Math.random() * 120, {
            duration: 5 + Math.random() * 5,
            driftRange: 160,
            scale: 0.55 + Math.random() * 0.9,
            width: 7 + Math.random() * 4,
            height: 6 + Math.random() * 3,
            opacity: 0.45 + Math.random() * 0.45
          });
        }
      }
    }

    for (let i = 0; i < 42; i++) createStar();
    seedHearts();
    setTimeout(() => burstHearts(window.innerWidth / 2, window.innerHeight * 0.78, 44), 450);
    setInterval(keepHeartsVisible, 900);

    let audioCtx = null;
    let scoreIndex = 0;

    function ensureAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }

    function playHammer(startAt, amount = 0.0038) {
      const bufferSize = Math.floor(audioCtx.sampleRate * 0.02);
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);

      for (let i = 0; i < bufferSize; i++) {
        const decay = Math.pow(1 - i / bufferSize, 3.4);
        data[i] = (Math.random() * 2 - 1) * decay;
      }

      const src = audioCtx.createBufferSource();
      const bandpass = audioCtx.createBiquadFilter();
      const gain = audioCtx.createGain();

      src.buffer = buffer;
      bandpass.type = 'bandpass';
      bandpass.frequency.setValueAtTime(2400, startAt);
      bandpass.Q.value = 0.9;

      gain.gain.setValueAtTime(amount, startAt);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.02);

      src.connect(bandpass);
      bandpass.connect(gain);
      gain.connect(audioCtx.destination);

      src.start(startAt);
      src.stop(startAt + 0.03);
    }

    function playPianoTone(freq, startAt, duration, volume, tone = 'triangle') {
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lowpass = audioCtx.createBiquadFilter();

      osc1.type = tone;
      osc2.type = 'sine';
      osc1.frequency.setValueAtTime(freq, startAt);
      osc2.frequency.setValueAtTime(freq * 2, startAt);

      lowpass.type = 'lowpass';
      lowpass.frequency.setValueAtTime(2200, startAt);

      gain.gain.setValueAtTime(0.0001, startAt);
      gain.gain.exponentialRampToValueAtTime(volume, startAt + 0.01);
      gain.gain.exponentialRampToValueAtTime(volume * 0.55, startAt + 0.06);
      gain.gain.exponentialRampToValueAtTime(volume * 0.18, startAt + duration * 0.55);
      gain.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);

      osc1.connect(lowpass);
      osc2.connect(lowpass);
      lowpass.connect(gain);
      gain.connect(audioCtx.destination);

      osc1.start(startAt);
      osc2.start(startAt);
      osc1.stop(startAt + duration + 0.03);
      osc2.stop(startAt + duration + 0.03);
    }

    function popNote(x, y, text) {
      const el = document.createElement('div');
      el.className = 'note-pop';
      el.textContent = text;
      el.style.left = (x + (Math.random() - 0.5) * 20) + 'px';
      el.style.top = (y - 8 + (Math.random() - 0.5) * 14) + 'px';
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }

    function playScoreStep() {
      ensureAudio();

      const ev = scoreEvents[scoreIndex];
      scoreIndex = (scoreIndex + 1) % scoreEvents.length;

      const startAt = audioCtx.currentTime + 0.002;

      ev.notes.forEach((n, i) => {
        const isBass = n.staff === 2;
        const tone = isBass ? 'triangle' : 'sine';
        const volume = isBass ? 0.015 : 0.020;
        const duration = Math.max(0.16, Math.min(n.dur, 1.2)) * 0.92;
        const offset = isBass ? 0 : 0.008 + i * 0.004;
        playHammer(startAt + offset, isBass ? 0.0042 : 0.0034);
        playPianoTone(n.freq, startAt + offset, duration, volume, tone);
      });

      return ev;
    }

    function handlePress(x, y) {
      burstHearts(x, y, 54);
      const ev = playScoreStep();
      popNote(x, y, `m${ev.measure} · ${ev.label}`);
    }

    window.addEventListener('click', (e) => handlePress(e.clientX, e.clientY));
    window.addEventListener('touchstart', (e) => {
      const t = e.touches[0];
      if (t) handlePress(t.clientX, t.clientY);
    }, { passive: true });
