<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>给你的小心心</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #2a103a 0%, #12061d 45%, #05010a 100%);
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
50% { transform: translateY(-8px); }
    }
50% { opacity: 1; }
    }
  
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      padding: 24px;
    }

    .message {
      text-align: center;
      color: #fff;
      text-shadow: 0 0 10px rgba(255,255,255,.25), 0 0 30px rgba(255, 90, 160, .35);
      animation: floatText 3.5s ease-in-out infinite;
      max-width: 88vw;
    }

    .message h1 {
      margin: 0;
      font-size: clamp(26px, 6.8vw, 54px);
      font-weight: 800;
      letter-spacing: 2px;
      line-height: 1.35;
      word-break: break-word;
    }

    @keyframes floatText {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay">
    <div class="message">
      <h1>你是人间四月天</h1>
    </div>
  </div>



  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let w = canvas.width = window.innerWidth * devicePixelRatio;
    let h = canvas.height = window.innerHeight * devicePixelRatio;
    ctx.scale(devicePixelRatio, devicePixelRatio);

    const DPR = devicePixelRatio || 1;
    let vw = window.innerWidth;
    let vh = window.innerHeight;
    let t = 0;
    const particles = [];
    const sparkles = [];

    function resize() {
      vw = window.innerWidth;
      vh = window.innerHeight;
      canvas.width = vw * DPR;
      canvas.height = vh * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);

    function heartPoint(a) {
      const x = 16 * Math.pow(Math.sin(a), 3);
      const y = 13 * Math.cos(a) - 5 * Math.cos(2 * a) - 2 * Math.cos(3 * a) - Math.cos(4 * a);
      return { x, y: -y };
    }

    function drawBigHeart(scalePulse) {
      const cx = vw / 2;
      const cy = vh / 2 + 10;
      const size = Math.min(vw, vh) * 0.018 * scalePulse;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 2; a += 0.02) {
        const p = heartPoint(a);
        const x = p.x * size;
        const y = p.y * size;
        if (a === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();

      const glow = ctx.createRadialGradient(0, -20, 20, 0, 0, 220);
      glow.addColorStop(0, 'rgba(255,120,180,0.95)');
      glow.addColorStop(0.45, 'rgba(255,70,140,0.70)');
      glow.addColorStop(1, 'rgba(255,40,110,0.08)');
      ctx.fillStyle = glow;
      ctx.shadowColor = 'rgba(255,80,150,0.8)';
      ctx.shadowBlur = 30;
      ctx.fill();

      ctx.lineWidth = 2.2;
      ctx.strokeStyle = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur = 14;
      ctx.stroke();
      ctx.restore();
    }

    function emitHeartBurst(x, y, count = 18) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
        const speed = 0.8 + Math.random() * 2.2;
        particles.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.6,
          size: 8 + Math.random() * 12,
          life: 70 + Math.random() * 25,
          maxLife: 95,
          hue: 330 + Math.random() * 20
        });
      }
    }

    function addAmbientSparkles() {
      if (sparkles.length < 60 && Math.random() < 0.55) {
        sparkles.push({
          x: Math.random() * vw,
          y: vh + 10,
          vy: 0.3 + Math.random() * 1,
          r: 1 + Math.random() * 2.5,
          alpha: 0.15 + Math.random() * 0.5
        });
      }
    }

    function drawTinyHeart(x, y, size, alpha) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(size, size);
      ctx.beginPath();
      for (let a = 0; a < Math.PI * 2; a += 0.3) {
        const p = heartPoint(a);
        const px = p.x * 0.6;
        const py = p.y * 0.6;
        if (a === 0) ctx.moveTo(px, py);
        else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = `rgba(255, 90, 150, ${alpha})`;
      ctx.shadowColor = `rgba(255, 90, 150, ${alpha})`;
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.restore();
    }

    function animate() {
      t += 0.035;
      ctx.clearRect(0, 0, vw, vh);

      const bg = ctx.createLinearGradient(0, 0, 0, vh);
      bg.addColorStop(0, 'rgba(255,255,255,0.02)');
      bg.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, vw, vh);

      addAmbientSparkles();

      for (let i = sparkles.length - 1; i >= 0; i--) {
        const s = sparkles[i];
        s.y -= s.vy;
        s.x += Math.sin((t + i) * 0.6) * 0.25;
        if (s.y < -10) {
          sparkles.splice(i, 1);
          continue;
        }
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
        ctx.fill();
      }

      const pulse = 1 + Math.sin(t * 2.2) * 0.06;
      drawBigHeart(pulse);

      if (Math.floor(t * 10) % 9 === 0 && Math.random() < 0.18) {
        emitHeartBurst(vw / 2 + (Math.random() - 0.5) * 80, vh / 2 + (Math.random() - 0.5) * 50, 8);
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.01;
        p.life -= 1;
        const alpha = Math.max(p.life / p.maxLife, 0);
        drawTinyHeart(p.x, p.y, p.size / 28, alpha);
        if (p.life <= 0) particles.splice(i, 1);
      }

      requestAnimationFrame(animate);
    }

    animate();

    function triggerBurst(clientX, clientY) {
      emitHeartBurst(clientX, clientY, 22);
    }

    window.addEventListener('click', e => triggerBurst(e.clientX, e.clientY));
    window.addEventListener('touchstart', e => {
      const touch = e.touches[0];
      if (touch) triggerBurst(touch.clientX, touch.clientY);
    }, { passive: true });

    setTimeout(() => emitHeartBurst(vw / 2, vh / 2, 26), 500);
    setInterval(() => {
      const x = vw / 2 + (Math.random() - 0.5) * 120;
      const y = vh / 2 + (Math.random() - 0.5) * 80;
      emitHeartBurst(x, y, 10);
    }, 1800);
  </script>
</body>
</html>
